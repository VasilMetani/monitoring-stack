apiVersion: 1
groups:
    - orgId: 1
      name: logs
      folder: Alerts-Kubernetes
      interval: 1m
      rules:
        - uid: ffnj4s2dlo9oga
          title: Frequent Logs Error
          condition: C
          data:
            - refId: A
              queryType: instant
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: loki
              model:
                datasource:
                    type: loki
                    uid: loki
                editorMode: code
                expr: "sum by(namespace, pod) (\r\n  count_over_time({namespace!=\"\"} |~ \"(?i)error|exception|failed|panic|crash\" [5m])\r\n)"
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                queryType: instant
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 20
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: Alerting
          for: 5m
          keepFiringFor: 5m
          annotations:
            summary: Pod {{ $labels.namespace }}/{{ $labels.pod }} is producing frequent error logs.
          labels:
            severity: warning
          isPaused: false
          notification_settings:
            receiver: Slack
    - orgId: 1
      name: nodes
      folder: Alerts-Kubernetes
      interval: 1m
      rules:
        - uid: efnioqpnrlam8b
          title: Node CPU Above 85%
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                editorMode: code
                expr: "(\r\n  100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100) > 85\r\n)\r\n* on(instance) group_left(nodename)\r\nnode_uname_info"
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: Alerting
          for: 10m
          keepFiringFor: 5m
          annotations:
            summary: 'CPU usage on {{ $labels.nodename }} ({{ $labels.instance }}) is above 85% — current: {{ $values.A.Value | printf "%.1f" }}%'
          labels:
            severity: critical
          isPaused: false
          notification_settings:
            receiver: Slack
        - uid: cfnis81er6x34c
          title: Node RAM above 90%
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                editorMode: code
                expr: "(\r\n  (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90\r\n)\r\n* on(instance) group_left(nodename)\r\nnode_uname_info"
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: Alerting
          for: 10m
          keepFiringFor: 5m
          annotations:
            summary: 'Memory usage on {{ $labels.nodename }} ({{ $labels.instance }}) is above 90% — current: {{ $values.A.Value | printf "%.1f" }}%'
          labels:
            severity: critical
          isPaused: false
          notification_settings:
            receiver: Slack
        - uid: cfnit5v1hu328c
          title: Disk above 80%
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                editorMode: code
                expr: "(\r\n  (1 - (node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay|squashfs\"} / node_filesystem_size_bytes{fstype!~\"tmpfs|overlay|squashfs\"})) * 100 > 80\r\n)\r\n* on(instance) group_left(nodename)\r\nnode_uname_info"
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: Alerting
          for: 5m
          keepFiringFor: 10m
          annotations:
            summary: 'Disk usage on {{ $labels.nodename }} ({{ $labels.instance }}) is above 80% — current: {{ $values.A.Value | printf "%.1f" }}%'
          labels:
            severity: critical
          isPaused: false
          notification_settings:
            receiver: Slack
        - uid: cfnj8svh8fk74d
          title: Node Not Ready
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                editorMode: code
                expr: kube_node_status_condition{condition="Ready", status=~"false|unknown"} == 1
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: Alerting
          for: 5m
          keepFiringFor: 5m
          annotations:
            summary: 'Node {{ $labels.node }} is not Ready — status: {{ $labels.status }}'
          labels:
            severity: critical
          isPaused: false
          notification_settings:
            receiver: Slack
    - orgId: 1
      name: workloads
      folder: Alerts-Kubernetes
      interval: 1m
      rules:
        - uid: afniye5iscmbkd
          title: Deployment Replicas Unavailable
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                editorMode: code
                expr: kube_deployment_status_replicas_unavailable
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 1
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: Alerting
          for: 5m
          keepFiringFor: 5m
          annotations:
            summary: Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas for more than 5 minutes.
          labels:
            severity: critical
          isPaused: false
          notification_settings:
            receiver: Slack
        - uid: dfnj1fkmnfzeoe
          title: High Number of Restarts
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                editorMode: code
                expr: "sum by(namespace, pod, container) (\r\n  increase(kube_pod_container_status_restarts_total[30m])\r\n)"
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 5
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: Alerting
          for: 5m
          keepFiringFor: 5m
          annotations:
            summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} restarted more than 5 times in 30 minutes.
          labels:
            severity: warning
          isPaused: false
          notification_settings:
            receiver: Slack
        - uid: cfnjaxz66ji0wa
          title: Pod CrashLoopBackOff
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                editorMode: code
                expr: kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: Alerting
          for: 5m
          keepFiringFor: 5m
          annotations:
            summary: Pod {{ $labels.namespace }}/{{ $labels.pod }} is in CrashLoopBackOff for about 5 minutes
          labels:
            severity: warning
          isPaused: false
          notification_settings:
            receiver: Slack
        - uid: cfnjbbnk9zi80a
          title: Pod Pending
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                editorMode: code
                expr: kube_pod_status_phase{phase="Pending"} == 1
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: Alerting
          for: 15m
          keepFiringFor: 5m
          annotations:
            summary: Pod {{ $labels.namespace }}/{{ $labels.pod }} stuck in Pending for over 15 minutes
          labels:
            severity: warning
          isPaused: false
          notification_settings:
            receiver: Slack
