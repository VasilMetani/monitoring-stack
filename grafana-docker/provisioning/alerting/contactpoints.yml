apiVersion: 1

contactPoints:
  - orgId: 1
    name: Email
    receivers:
      - uid: email-receiver
        type: email
        settings:
          addresses: $ALERT_EMAIL #who recieves the email
          singleEmail: false

  - orgId: 1
    name: Slack
    receivers:
      - uid: slack-receiver
        type: slack
        settings:
          url: $SLACK_WEBHOOK_URL
          title: '{{ template "default.title" . }}'
          text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
